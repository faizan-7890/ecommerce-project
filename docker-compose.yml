version: '3.8'

services:
  # 1. MySQL Database Service
  db:
    image: mysql:8.0
    container_name: veloce-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ecommerce
      MYSQL_USER: veloce
      MYSQL_PASSWORD: veloce_pass
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  # 2. FastAPI Backend REST API
  backend:
    build: ./backend-fastapi
    container_name: veloce-backend-api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://root:root@db:3306/ecommerce
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - ./backend-fastapi:/app
    env_file:
      - ./backend-fastapi/.env
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysqldata:
